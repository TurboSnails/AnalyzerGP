<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Streaming Tester (Agentic RAG)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-base:    #0d1117;
    --bg-panel:   #161b22;
    --bg-card:    #1c2128;
    --bg-input:   #21262d;
    --border:     #30363d;
    --border-subtle: #21262d;
    --text-primary:  #e6edf3;
    --text-secondary:#8b949e;
    --text-muted:    #484f58;
    --accent:     #58a6ff;
    --accent-dim: #1f3a5f;
    --green:      #3fb950;
    --yellow:     #d29922;
    --red:        #f85149;
    --purple:     #bc8cff;
    --cyan:       #39c5cf;
    --user-bg:    #1f3a5f;
    --ai-bg:      #1c2128;
    --radius:     10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font);
    font-size: 14px;
    background: var(--bg-base);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
  }

  header {
    flex-shrink: 0;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .3px; }
  .tag {
    font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    background: var(--accent-dim); color: var(--accent); letter-spacing: .5px;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  .config-bar {
    flex-shrink: 0;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-subtle);
    padding: 8px 20px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .config-bar label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .config-bar input[type="text"] {
    flex: 1; min-width: 200px; max-width: 360px;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-primary); font-family: var(--mono); font-size: 12px;
    padding: 5px 10px; outline: none; transition: border-color .15s;
  }
  .config-bar input[type="text"]:focus { border-color: var(--accent); }

  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); flex-shrink: 0; }
  .status-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.error   { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  .status-text { font-size: 12px; color: var(--text-secondary); }

  .main-wrap { flex: 1; display: flex; overflow: hidden; }

  .chat-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .chat-wrap::-webkit-scrollbar { width: 6px; }
  .chat-wrap::-webkit-scrollbar-track { background: transparent; }
  .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: var(--text-muted); user-select: none;
  }
  .empty-state .icon { font-size: 40px; }
  .empty-state p { font-size: 14px; }

  .msg-row {
    display: flex; flex-direction: column; gap: 4px;
    max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg-row.user { align-items: flex-end; }
  .msg-row.ai   { align-items: flex-start; }

  .msg-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; padding: 0 4px; }

  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: var(--radius);
    line-height: 1.6; word-break: break-word; white-space: pre-wrap; font-size: 14px;
  }
  .bubble.user {
    background: var(--user-bg); border: 1px solid #2d4f7a; color: var(--text-primary);
    border-bottom-right-radius: 3px;
  }
  .bubble.ai {
    background: var(--ai-bg); border: 1px solid var(--border); color: var(--text-primary);
    border-bottom-left-radius: 3px;
  }
  .bubble.ai.streaming::after {
    content: '▋'; color: var(--accent); animation: blink .8s step-end infinite; margin-left: 1px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .metrics-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 4px; margin-top: 4px; }
  .metric {
    display: flex; align-items: center; gap: 4px; font-size: 11px; font-family: var(--mono);
    background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: 4px;
    padding: 2px 7px; color: var(--text-secondary);
  }
  .metric .key { color: var(--text-muted); }
  .metric .val { font-weight: 600; }
  .metric.ttft-good  .val { color: var(--green); }
  .metric.ttft-ok    .val { color: var(--yellow); }
  .metric.ttft-slow  .val { color: var(--red); }
  .metric.live .val { color: var(--accent); }

  .ttft-live {
    font-size: 11px; font-family: var(--mono); color: var(--accent);
    padding: 0 4px; animation: pulse .8s infinite;
  }

  .bubble.error {
    background: #2d1f1f; border-color: #5c2020; color: var(--red); font-size: 13px;
  }

  /* ── Agentic Trace 侧边栏 ── */
  .trace-panel {
    width: 280px; flex-shrink: 0;
    background: var(--bg-panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .trace-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border-subtle);
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
  }
  .trace-list {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .trace-item {
    background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 6px;
    padding: 8px 10px; font-size: 12px; line-height: 1.5;
    cursor: default; transition: border-color .15s;
  }
  .trace-item:hover { border-color: var(--border); }
  .trace-step { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .trace-detail { color: var(--text-secondary); font-family: var(--mono); font-size: 11px; white-space: pre-wrap; }
  .trace-item.intent .trace-step { color: var(--purple); }
  .trace-item.decompose .trace-step { color: var(--cyan); }
  .trace-item.retrieve .trace-step { color: var(--green); }
  .trace-item.evaluate .trace-step { color: var(--yellow); }
  .trace-item.rewrite .trace-step { color: var(--red); }
  .trace-item.expand_kg .trace-step { color: var(--accent); }
  .trace-item.generate .trace-step { color: var(--green); }
  .trace-item.self_check .trace-step { color: var(--yellow); }

  .input-area {
    flex-shrink: 0;
    background: var(--bg-panel); border-top: 1px solid var(--border);
    padding: 14px 20px;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    max-width: 820px; margin: 0 auto;
  }
  textarea {
    flex: 1;
    background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-primary); font-family: var(--font); font-size: 14px;
    padding: 10px 14px; resize: none; outline: none; line-height: 1.5;
    min-height: 44px; max-height: 160px; transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-muted); }

  .btn {
    cursor: pointer; border: none; border-radius: var(--radius);
    font-size: 13px; font-weight: 600; padding: 0 16px; height: 44px;
    transition: opacity .15s, background .15s; white-space: nowrap; outline: none;
  }
  .btn:active { opacity: .8; }
  .btn-primary { background: var(--accent); color: #0d1117; }
  .btn-primary:hover { background: #79b8ff; }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-card); color: var(--text-primary); }

  .input-hint {
    max-width: 820px; margin: 6px auto 0;
    font-size: 11px; color: var(--text-muted); padding: 0 2px;
  }
</style>
</head>
<body>

<header>
  <h1>Chat Streaming Tester</h1>
  <span class="tag">Agentic RAG</span>
  <div class="header-right">
    <button class="btn btn-ghost" id="clearBtn" style="height:32px;padding:0 12px;font-size:12px;">清除历史</button>
  </div>
</header>

<div class="config-bar">
  <label>API</label>
  <input type="text" id="apiUrl" value="http://localhost:8002" spellcheck="false" autocomplete="off" />
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">未连接</span>
</div>

<div class="main-wrap">
  <div class="chat-wrap" id="chatWrap">
    <div class="empty-state" id="emptyState">
      <div class="icon">🤖</div>
      <p>发送消息体验 Agentic RAG 流式响应</p>
      <p style="font-size:12px;color:var(--text-muted);">右侧将展示 Agentic 执行轨迹</p>
    </div>
  </div>

  <div class="trace-panel" id="tracePanel">
    <div class="trace-header">📋 Agentic Trace</div>
    <div class="trace-list" id="traceList"></div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" rows="1" placeholder="输入消息… Enter 发送，Shift+Enter 换行"></textarea>
    <button class="btn btn-primary" id="sendBtn">发送 ↵</button>
  </div>
  <div class="input-hint" id="inputHint">Enter 发送 &nbsp;·&nbsp; Shift+Enter 换行</div>
</div>

<script>
(function () {
  const chatWrap  = document.getElementById('chatWrap');
  const emptyState = document.getElementById('emptyState');
  const msgInput  = document.getElementById('msgInput');
  const sendBtn   = document.getElementById('sendBtn');
  const clearBtn  = document.getElementById('clearBtn');
  const apiUrlEl  = document.getElementById('apiUrl');
  const statusDot = document.getElementById('statusDot');
  const statusTxt = document.getElementById('statusText');
  const traceList = document.getElementById('traceList');

  let isSending = false;

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isSending) handleSend();
    }
  });

  sendBtn.addEventListener('click', () => { if (!isSending) handleSend(); });
  clearBtn.addEventListener('click', () => {
    chatWrap.innerHTML = '';
    chatWrap.appendChild(emptyState);
    emptyState.style.display = 'flex';
    traceList.innerHTML = '';
  });

  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusTxt.textContent = text;
  }

  function fmt(ms) { return (ms / 1000).toFixed(2) + 's'; }
  function fmtSpeed(chars, ms) {
    if (ms < 10) return '—';
    return (chars / (ms / 1000)).toFixed(0) + ' 字/秒';
  }
  function ttftClass(ms) {
    if (ms < 1000) return 'ttft-good';
    if (ms < 3000) return 'ttft-ok';
    return 'ttft-slow';
  }

  function removeEmpty() { emptyState.style.display = 'none'; }

  function appendUserMsg(text) {
    removeEmpty();
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `<div class="msg-label">你</div><div class="bubble user">${escHtml(text)}</div>`;
    chatWrap.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendAiRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `
      <div class="msg-label">AI</div>
      <div class="bubble ai streaming" id="aiBubble"></div>
      <div class="metrics-bar" id="metricsBar">
        <span class="ttft-live" id="ttftLive">⏱ 等待首字…</span>
      </div>`;
    chatWrap.appendChild(row);
    scrollBottom();
    return row;
  }

  function finalizeMetrics(bar, ttftMs, totalMs, charCount) {
    const liveEl = document.getElementById('ttftLive');
    if (liveEl) liveEl.remove();
    const tc = ttftClass(ttftMs);
    bar.innerHTML = `
      <div class="metric ${tc}"><span class="key">TTFT</span><span class="val">${fmt(ttftMs)}</span></div>
      <div class="metric"><span class="key">总耗时</span><span class="val">${fmt(totalMs)}</span></div>
      <div class="metric"><span class="key">字符</span><span class="val">${charCount}</span></div>
      <div class="metric"><span class="key">速度</span><span class="val">${fmtSpeed(charCount, totalMs)}</span></div>`;
  }

  function appendError(text) {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = `<div class="msg-label">Error</div><div class="bubble error">${escHtml(text)}</div>`;
    chatWrap.appendChild(row);
    scrollBottom();
  }

  function scrollBottom() { chatWrap.scrollTop = chatWrap.scrollHeight; }

  function escHtml(str) {
    return str.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
  }

  function renderTrace(trace) {
    traceList.innerHTML = '';
    if (!Array.isArray(trace)) return;
    trace.forEach(t => {
      const step = t.step || 'unknown';
      const item = document.createElement('div');
      item.className = 'trace-item ' + step;
      const detail = JSON.stringify(t, null, 2);
      item.innerHTML = `<div class="trace-step">${escHtml(step)}</div><div class="trace-detail">${escHtml(detail)}</div>`;
      traceList.appendChild(item);
    });
    traceList.scrollTop = traceList.scrollHeight;
  }

  async function handleSend() {
    const message = msgInput.value.trim();
    if (!message) return;

    isSending = true;
    sendBtn.disabled = true;
    msgInput.value = '';
    msgInput.style.height = 'auto';

    appendUserMsg(message);
    const aiRow = appendAiRow();
    const bubble = aiRow.querySelector('#aiBubble');
    const metricsBar = aiRow.querySelector('#metricsBar');
    const ttftLive = aiRow.querySelector('#ttftLive');

    const apiUrl = apiUrlEl.value.trim().replace(/\/$/, '');
    setStatus('loading', '请求中…');

    const sendTime = performance.now();
    let firstTokenTime = null;
    let charCount = 0;
    let text = '';

    try {
      const resp = await fetch(`${apiUrl}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${errText}`);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();

      bubble.classList.add('streaming');
      setStatus('loading', '接收中…');

      const timerInterval = setInterval(() => {
        if (firstTokenTime === null && ttftLive) {
          const elapsed = performance.now() - sendTime;
          ttftLive.textContent = `⏱ 等待首字… ${(elapsed/1000).toFixed(1)}s`;
        }
      }, 100);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed.startsWith('data:')) continue;
          const jsonStr = trimmed.slice(5).trim();
          if (!jsonStr) continue;
          try {
            const data = JSON.parse(jsonStr);
            if (data.type === 'trace') {
              renderTrace(data.payload);
              continue;
            }
            if (data.type === 'content') {
              if (firstTokenTime === null) {
                firstTokenTime = performance.now();
                const ttft = firstTokenTime - sendTime;
                if (ttftLive) {
                  ttftLive.textContent = `⚡ 首字 ${fmt(ttft)}`;
                  ttftLive.style.animation = 'none';
                }
                setStatus('online', `首字 ${fmt(ttft)}`);
              }
              text += data.payload;
              charCount += (data.payload || '').length;
              bubble.textContent = text;
              scrollBottom();
            }
            if (data.type === 'error') {
              appendError(data.payload || '未知错误');
            }
            if (data.type === 'done') {
              // 结束
            }
          } catch (e) {
            // 忽略解析失败的行
          }
        }
      }

      clearInterval(timerInterval);

      const totalMs = performance.now() - sendTime;
      const ttftMs = firstTokenTime ? firstTokenTime - sendTime : totalMs;

      bubble.classList.remove('streaming');
      finalizeMetrics(metricsBar, ttftMs, totalMs, charCount);
      setStatus('online', `完成 · 耗时 ${fmt(totalMs)}`);

    } catch (err) {
      bubble.remove();
      metricsBar.remove();
      appendError(err.message || String(err));
      setStatus('error', '请求失败');
    } finally {
      isSending = false;
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  msgInput.focus();
})();
</script>
</body>
</html>
